name: Build Sofi APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip zip unzip git openjdk-17-jdk
          python3 -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Install Android SDK for Buildozer
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
            "ndk;25.2.9519653"

      - name: Set Buildozer paths
        run: |
          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/.buildozer/android/platform/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROIDAPI=33" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=24" >> $GITHUB_ENV

      - name: Clean previous build
        run: |
          rm -rf .buildozer
      - name: Fix Android SDK manager path
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          ln -s $ANDROID_HOME/cmdline-tools/latest \
          $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest

          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

      - name: Build APK
        run: |
          buildozer android debug
      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sofi-APK
          path: bin/*.apk
