name: Build Sofi APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
      ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk-r25b
      ANDROIDAPI: 35
      ANDROIDMINAPI: 24

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer Cython==0.29.36
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip git \
            libffi-dev libssl-dev \
            build-essential \
            autoconf automake libtool \
            pkg-config zlib1g-dev

      - name: Install Android SDK Tools
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;25.2.9519653"

      - name: Fix sdkmanager path for Buildozer
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin

          ln -sf \
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          ln -sf \
          $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager \
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/avdmanager

      - name: Build APK
        run: |
          export ANDROID_HOME=$ANDROIDSDK
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH

          yes | sdkmanager --licenses

          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sofi-APK
          path: bin/*.apk
